version: "3.8"

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - PORT=5000
    depends_on:
      - auth-service
      - core-service
      - interaction-service
      - admin-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb+srv://thanhtu_user:Thanhtu%40204@cluster0.h3nsaiz.mongodb.net/auth_db?appName=Cluster0
      - INTERNAL_API_SECRET=super_secret_internal_key_123
    restart: unless-stopped

  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb+srv://thanhtu_user:Thanhtu%40204@cluster0.h3nsaiz.mongodb.net/core_db?appName=Cluster0
      - INTERNAL_API_SECRET=super_secret_internal_key_123
    restart: unless-stopped

  interaction-service:
    build:
      context: ./interaction-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      - PORT=5003
      - MONGODB_URI=mongodb+srv://thanhtu_user:Thanhtu%40204@cluster0.h3nsaiz.mongodb.net/interaction_db?appName=Cluster0
      - INTERNAL_API_SECRET=super_secret_internal_key_123
    restart: unless-stopped

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    env_file: .env
    environment:
      - PORT=5004
      - MONGODB_URI=mongodb+srv://thanhtu_user:Thanhtu%40204@cluster0.h3nsaiz.mongodb.net/admin_db?appName=Cluster0
      - INTERNAL_API_SECRET=super_secret_internal_key_123
    restart: unless-stopped
