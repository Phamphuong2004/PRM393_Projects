name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - core-service
          - interaction-service
          - admin-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: Scientific_Journal_Trend_Tracker_Backend/${{ matrix.service }}
        run: npm install --no-fund --no-audit

      - name: Lint
        working-directory: Scientific_Journal_Trend_Tracker_Backend/${{ matrix.service }}
        run: npm run lint

      - name: Test
        working-directory: Scientific_Journal_Trend_Tracker_Backend/${{ matrix.service }}
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: Scientific_Journal_Trend_Tracker_Backend/${{ matrix.service }}
        run: npm run build

  frontend:
    name: Flutter / Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scientific_journal_trend_tracker_frontend_flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build web
        run: flutter build web --release

  ai-service:
    name: AI Service / Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall .
